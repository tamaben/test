<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANC Visualizer (Phase Inversion)</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: #0d0d0d;
            color: #fff;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            background: #1a1a1a;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 0 30px rgba(0,255,128,0.1);
            text-align: center;
            max-width: 600px;
            width: 100%;
            border: 1px solid #333;
        }
        h2 { margin-top: 0; color: #fff; letter-spacing: 2px; }
        .description { font-size: 14px; line-height: 1.6; margin-bottom: 20px; color: #aaa; }
        .legend {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
            font-size: 14px;
            font-weight: bold;
        }
        .legend-green { color: #00ff80; }
        .legend-red { color: #ff4040; }
        .warning {
            color: #000;
            background-color: #ffcc00;
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 20px;
            padding: 12px;
            border-radius: 8px;
        }
        canvas {
            width: 100%;
            height: 200px;
            background-color: #000;
            border-radius: 8px;
            margin-bottom: 25px;
            border: 1px solid #333;
        }
        button {
            padding: 16px 40px;
            font-size: 18px;
            font-weight: bold;
            color: #000;
            background-color: #fff;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
        }
        button:hover:not(:disabled) { transform: scale(1.05); }
        button:disabled { background-color: #333; color: #666; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="container">
    <h2>ANC WAVEFORM VISUALIZER</h2>
    <p class="description">
        ノイズキャンセリングの仕組みを視覚化します。<br>
        入力された音波と、それを打ち消すための逆位相の音波を表示します。
    </p>

    <div class="legend">
        <span class="legend-green">■ 元の入力音（マイク）</span>
        <span class="legend-red">■ 逆位相の出力音（ANC）</span>
    </div>

    <!-- 波形を描画するキャンバス -->
    <canvas id="oscilloscope" width="600" height="200"></canvas>

    <div class="warning">
        ⚠️ 鼓膜を保護するため、最初は音量を最小にしてから<br>必ずイヤホンを装着して実行してください。
    </div>
    
    <button id="startButton">ANC ＆ 視覚化を開始</button>
    <button id="stopButton" disabled style="margin-top: 15px; background-color: transparent; border: 2px solid #fff; color: #fff;">停止</button>
</div>

<script>
    let audioContext;
    let mediaStream;
    let animationId;

    const startButton = document.getElementById('startButton');
    const stopButton = document.getElementById('stopButton');
    const canvas = document.getElementById('oscilloscope');
    const canvasCtx = canvas.getContext('2d');

    // キャンバスの初期化（黒塗り）
    canvasCtx.fillStyle = 'rgb(0, 0, 0)';
    canvasCtx.fillRect(0, 0, canvas.width, canvas.height);

    startButton.addEventListener('click', async () => {
        try {
            audioContext = new (window.AudioContext || window.webkitAudioContext)();

            // ブラウザのソフトウェア補正を完全オフ（生の音波を取得）
            mediaStream = await navigator.mediaDevices.getUserMedia({ 
                audio: {
                    noiseSuppression: false, 
                    echoCancellation: false,
                    autoGainControl: false
                }, 
                video: false 
            });

            const sourceNode = audioContext.createMediaStreamSource(mediaStream);

            // すべての音を反転させる（ゲイン -1.0）
            const phaseInverter = audioContext.createGain();
            phaseInverter.gain.value = -1.0; 

            // 波形解析用のノードを作成（入力用と出力用）
            const analyserInput = audioContext.createAnalyser();
            const analyserOutput = audioContext.createAnalyser();
            analyserInput.fftSize = 2048;
            analyserOutput.fftSize = 2048;

            const bufferLength = analyserInput.frequencyBinCount;
            const dataArrayInput = new Uint8Array(bufferLength);
            const dataArrayOutput = new Uint8Array(bufferLength);

            // ==========================================
            // 接続ルーティング
            // ==========================================
            
            // 1. マイク入力を解析ノード（緑）と反転ノードへ
            sourceNode.connect(analyserInput);
            sourceNode.connect(phaseInverter);

            // 2. 反転させた音を解析ノード（赤）とスピーカーへ
            phaseInverter.connect(analyserOutput);
            phaseInverter.connect(audioContext.destination);


            // ==========================================
            // 描画ループ関数
            // ==========================================
            function draw() {
                animationId = requestAnimationFrame(draw);

                // 現在の波形データを配列に取得
                analyserInput.getByteTimeDomainData(dataArrayInput);
                analyserOutput.getByteTimeDomainData(dataArrayOutput);

                // 背景を黒で塗りつぶす（残像を消す）
                canvasCtx.fillStyle = 'rgb(0, 0, 0)';
                canvasCtx.fillRect(0, 0, canvas.width, canvas.height);

                canvasCtx.lineWidth = 2;
                const sliceWidth = canvas.width * 1.0 / bufferLength;

                // --- 元の波形（緑）を描画 ---
                canvasCtx.strokeStyle = 'rgb(0, 255, 128)';
                canvasCtx.beginPath();
                let x = 0;
                for (let i = 0; i < bufferLength; i++) {
                    const v = dataArrayInput[i] / 128.0;
                    const y = v * canvas.height / 2;
                    if (i === 0) canvasCtx.moveTo(x, y);
                    else canvasCtx.lineTo(x, y);
                    x += sliceWidth;
                }
                canvasCtx.stroke();

                // --- 反転した波形（赤）を描画 ---
                canvasCtx.strokeStyle = 'rgb(255, 64, 64)';
                canvasCtx.beginPath();
                x = 0;
                for (let i = 0; i < bufferLength; i++) {
                    const v = dataArrayOutput[i] / 128.0;
                    const y = v * canvas.height / 2;
                    if (i === 0) canvasCtx.moveTo(x, y);
                    else canvasCtx.lineTo(x, y);
                    x += sliceWidth;
                }
                canvasCtx.stroke();
                
                // 真ん中の基準線を引く
                canvasCtx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
                canvasCtx.beginPath();
                canvasCtx.moveTo(0, canvas.height / 2);
                canvasCtx.lineTo(canvas.width, canvas.height / 2);
                canvasCtx.stroke();
            }

            // 描画開始
            draw();

            // UI更新
            startButton.disabled = true;
            stopButton.disabled = false;
            startButton.innerText = "ANC ＆ 視覚化 稼働中";
            startButton.style.backgroundColor = "#00ff80";

        } catch (err) {
            console.error('エラー:', err);
            alert('マイクのアクセスに失敗しました。');
        }
    });

    stopButton.addEventListener('click', () => {
        if (audioContext) audioContext.close();
        if (mediaStream) mediaStream.getTracks().forEach(track => track.stop());
        if (animationId) cancelAnimationFrame(animationId);
        
        // キャンバスをクリア
        canvasCtx.fillStyle = 'rgb(0, 0, 0)';
        canvasCtx.fillRect(0, 0, canvas.width, canvas.height);

        // UI更新
        startButton.disabled = false;
        stopButton.disabled = true;
        startButton.innerText = "ANC ＆ 視覚化を開始";
        startButton.style.backgroundColor = "#fff";
    });
</script>

</body>
</html>
