<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>シェイク・タイムアタック</title>
    <style>
        /* モバイル向けのシンプルなデザイン */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #1a1a1a;
            color: #ffffff;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }
        .container {
            text-align: center;
            width: 90%;
            max-width: 400px;
            padding: 20px;
            box-sizing: border-box;
        }
        h1 {
            font-size: 24px;
            margin-bottom: 20px;
            color: #ffcc00;
        }
        .btn {
            background-color: #ffcc00;
            color: #1a1a1a;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: transform 0.1s;
            margin-top: 20px;
            width: 80%;
        }
        .btn:active {
            transform: scale(0.95);
        }
        .screen {
            display: none;
        }
        .screen.active {
            display: block;
        }
        .count-display {
            font-size: 80px;
            font-weight: bold;
            margin: 20px 0;
            color: #00ffcc;
        }
        .timer-display {
            font-size: 24px;
            color: #ff5555;
            margin-bottom: 20px;
        }
        .note {
            font-size: 12px;
            color: #aaaaaa;
            margin-top: 20px;
            line-height: 1.5;
            text-align: left;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 開始画面 -->
        <div id="screen-start" class="screen active">
            <h1>シェイク・タイムアタック</h1>
            <p>10秒間にスマホを振った回数を競うゲームです。</p>
            <button class="btn" id="btn-start">ゲームを開始する</button>
            <p class="note">
                ※iPhoneでプレイする場合、動作センサーのアクセス許可が必要です。「ゲームを開始する」を押した後に表示されるダイアログで許可を選択してください。<br>
                ※また、本ゲームはHTTPSによる安全な通信環境でのみ動作します。
            </p>
        </div>

        <!-- 準備中画面（カウントダウン） -->
        <div id="screen-ready" class="screen">
            <h1>Ready...</h1>
            <div id="ready-timer" style="font-size: 48px; font-weight: bold; color: #ffcc00; margin: 30px 0;">3</div>
        </div>

        <!-- プレイ画面 -->
        <div id="screen-play" class="screen">
            <div class="timer-display">残り時間: <span id="play-timer">10.0</span> 秒</div>
            <p>スマホを振れ！</p>
            <div class="count-display" id="count-num">0</div>
        </div>

        <!-- 結果画面 -->
        <div id="screen-result" class="screen">
            <h1>結果発表</h1>
            <p>あなたの記録は...</p>
            <div class="count-display" id="result-score" style="color: #ffcc00;">0回</div>
            <button class="btn" id="btn-retry">もう一度挑戦する</button>
        </div>
    </div>

    <script>
        // DOM要素の取得
        const screenStart = document.getElementById('screen-start');
        const screenReady = document.getElementById('screen-ready');
        const screenPlay = document.getElementById('screen-play');
        const screenResult = document.getElementById('screen-result');

        const btnStart = document.getElementById('btn-start');
        const btnRetry = document.getElementById('btn-retry');
        const readyTimerDisplay = document.getElementById('ready-timer');
        const playTimerDisplay = document.getElementById('play-timer');
        const countNumDisplay = document.getElementById('count-num');
        const resultScoreDisplay = document.getElementById('result-score');

        // ゲーム変数の定義
        let score = 0;
        let isPlaying = false;
        let gameTimer = null;
        let timeLeft = 10.0;

        // 振る動作の検知用パラメータ
        let lastX = null, lastY = null, lastZ = null;
        // SHAKE_THRESHOLD（しきい値）とSHAKE_INTERVAL（連打検知防止のミリ秒）は、
        // 端末の挙動に合わせて適宜調整が可能です。
        const SHAKE_THRESHOLD = 15; 
        const SHAKE_INTERVAL = 150; 
        let lastShakeTime = 0;

        // 画面切り替え用関数
        function showScreen(screen) {
            screenStart.classList.remove('active');
            screenReady.classList.remove('active');
            screenPlay.classList.remove('active');
            screenResult.classList.remove('active');
            screen.classList.add('active');
        }

        // イベントリスナーの追加
        btnStart.addEventListener('click', () => {
            requestMotionPermission();
        });

        btnRetry.addEventListener('click', () => {
            showScreen(screenStart);
        });

        // 動作センサーの許可リクエスト（iOS 13+ 対応）
        function requestMotionPermission() {
            if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
                DeviceMotionEvent.requestPermission()
                    .then(permissionState => {
                        if (permissionState === 'granted') {
                            startReadyCountdown();
                        } else {
                            alert('センサーの利用許可が得られませんでした。');
                        }
                    })
                    .catch(error => {
                        console.error(error);
                        alert('センサーの初期化に失敗しました。HTTPS接続であることを確認してください。');
                    });
            } else {
                // iOS以外の端末（Androidなど）や、古いiOSバージョン向け
                startReadyCountdown();
            }
        }

        // 開始前のカウントダウン（3, 2, 1）
        function startReadyCountdown() {
            showScreen(screenReady);
            let count = 3;
            readyTimerDisplay.textContent = count;
            
            const interval = setInterval(() => {
                count--;
                if (count > 0) {
                    readyTimerDisplay.textContent = count;
                } else {
                    clearInterval(interval);
                    startGame();
                }
            }, 1000);
        }

        // ゲーム本編の開始
        function startGame() {
            score = 0;
            timeLeft = 10.0;
            isPlaying = true;
            countNumDisplay.textContent = score;
            playTimerDisplay.textContent = timeLeft.toFixed(1);
            
            showScreen(screenPlay);

            // 加速度センサーイベントを登録
            window.addEventListener('devicemotion', handleMotion, true);

            // 残り時間の計測タイマー（10秒）
            const startTime = Date.now();
            gameTimer = setInterval(() => {
                const elapsed = (Date.now() - startTime) / 1000;
                timeLeft = Math.max(0, 10.0 - elapsed);
                playTimerDisplay.textContent = timeLeft.toFixed(1);

                if (timeLeft <= 0) {
                    endGame();
                }
            }, 50);
        }

        // 振る動作の検知処理
        function handleMotion(event) {
            if (!isPlaying) return;

            // 重力を含まない純粋な加速度（event.acceleration）が推奨されますが、
            // 端末により値が入らない場合があるため、重力含む加速度（event.accelerationIncludingGravity）を使用します。
            const acc = event.accelerationIncludingGravity;
            if (!acc) return;

            const x = acc.x || 0;
            const y = acc.y || 0;
            const z = acc.z || 0;

            if (lastX !== null) {
                // 前回取得したセンサー値との差分（変化量）を算出
                const deltaX = Math.abs(x - lastX);
                const deltaY = Math.abs(y - lastY);
                const deltaZ = Math.abs(z - lastZ);

                // いずれかの軸で一定以上の変化があり、かつ一定のインターバルが経過している場合
                if (deltaX > SHAKE_THRESHOLD || deltaY > SHAKE_THRESHOLD || deltaZ > SHAKE_THRESHOLD) {
                    const now = Date.now();
                    if (now - lastShakeTime > SHAKE_INTERVAL) {
                        score++;
                        countNumDisplay.textContent = score;
                        lastShakeTime = now;
                        
                        // 振ったことをユーザーにフィードバックするため、背景を一瞬グレーにする
                        document.body.style.backgroundColor = '#333333';
                        setTimeout(() => {
                            if (isPlaying) document.body.style.backgroundColor = '#1a1a1a';
                        }, 50);
                    }
                }
            }

            lastX = x;
            lastY = y;
            lastZ = z;
        }

        // ゲーム終了処理
        function endGame() {
            isPlaying = false;
            clearInterval(gameTimer);
            // センサーイベントの登録解除
            window.removeEventListener('devicemotion', handleMotion, true);
            document.body.style.backgroundColor = '#1a1a1a';

            // 変数のリセット
            lastX = null;
            lastY = null;
            lastZ = null;

            resultScoreDisplay.textContent = score + '回';
            showScreen(screenResult);
        }
    </script>
</body>
</html>
