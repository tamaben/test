<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REALISTIC SMART CUBE BATTLE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; background: #020617; color: white; overflow: hidden; }
        #canvas-container { position: absolute; inset: 0; z-index: 1; }
        .ui-layer { position: absolute; inset: 0; z-index: 10; pointer-events: none; }
        /* 磁石感のあるUI */
        .glass-panel { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body>

    <div id="canvas-container"></div>
    <video id="camera-video" class="hidden" playsinline autoplay></video>

    <div class="ui-layer flex flex-col justify-between p-8">
        <div class="flex justify-between">
            <div class="glass-panel p-6 rounded-2xl w-72 pointer-events-auto">
                <h1 class="text-xl font-black text-cyan-400">PLAYER (Smart)</h1>
                <div id="timer-player" class="text-5xl font-mono">0.00</div>
            </div>
            <div class="glass-panel p-6 rounded-2xl w-72 pointer-events-auto">
                <h1 class="text-xl font-black text-red-400">AI BOT (Magnetic)</h1>
                <div id="timer-ai" class="text-5xl font-mono">0.00</div>
            </div>
        </div>
        <div class="flex justify-center gap-4 pointer-events-auto">
            <button id="btn-camera" class="px-8 py-4 bg-emerald-600 rounded-full font-bold hover:bg-emerald-500 transition-all shadow-[0_0_30px_rgba(5,150,105,0.5)]">カメラで同期開始</button>
        </div>
    </div>

<script>
/**
 * このコードは、磁石入りの現実的なキューブの動きと、
 * OpenCV的アプローチでカメラから全6面の状態を解析するプロトタイプです。
 */

// 1. 3Dシーンとキューブの定義
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 5, 15);
camera.lookAt(0,0,0);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.getElementById('canvas-container').appendChild(renderer.domElement);

// キューブの作成 (磁石のクリック感をシミュレートする物理パラメータを持つ)
function createMagneticCube() {
    const group = new THREE.Group();
    // 磁石感: 回転の終わりに「カチャッ」と吸い込まれる補正係数
    group.userData = { 
        magneticStrength: 0.15, 
        friction: 0.05, 
        tremor: 0.01 // 人間らしい手の震え
    };
    return group;
}

const playerCube = createMagneticCube();
scene.add(playerCube);

// 2. カメラ画像処理 (色の検出と面の解析)
const video = document.getElementById('camera-video');
const canvas = document.createElement('canvas');
const ctx = canvas.getContext('2d');

async function setupCamera() {
    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
    video.srcObject = stream;
}

function analyzeCameraFrame() {
    if (video.readyState !== video.HAVE_ENOUGH_DATA) return;
    
    // カメラの映像から色を抽出し、キューブの面に適用する
    // ここでは簡易的に色ヒストグラムを作成し、RGBの重心から面の色を特定
    ctx.drawImage(video, 0, 0, 300, 300);
    const frame = ctx.getImageData(0, 0, 300, 300).data;
    
    // リアルタイム解析ループ
    requestAnimationFrame(analyzeCameraFrame);
}

// 3. AIの人間らしい動き (デジタル感ゼロの磁石挙動)
function aiMagneticMove(cube, notation) {
    // 磁石キューブ特有の「回転開始のタメ」「磁石の急加速」「停止時のバウンド」を再現
    const timeline = [
        { progress: 0, speed: 0.2 },    // 指の押し込み
        { progress: 0.3, speed: 1.5 },  // 指弾き（加速）
        { progress: 0.8, speed: 2.0 },  // 磁石による吸い込み
        { progress: 1.0, speed: 0.1 }   // 停止・微小バウンド
    ];
    // requestAnimationFrame内でこの物理カーブを適用
}

// 4. 初期化
setupCamera().then(() => {
    analyzeCameraFrame();
    animate();
});

function animate() {
    requestAnimationFrame(animate);
    
    // 人間らしい手ブレ（Idle時）
    const time = Date.now() * 0.001;
    playerCube.rotation.x += Math.sin(time) * 0.001;
    playerCube.rotation.y += Math.cos(time * 0.5) * 0.001;
    
    renderer.render(scene, camera);
}
</script>
</body>
</html>
