<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ULTIMATE SMART CUBE BATTLE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; touch-action: none; font-family: 'Inter', sans-serif; color: white; user-select: none; background: #020617; }
        #bg-gradient { position: absolute; inset: 0; z-index: -2; background: radial-gradient(circle at center, #0f172a 0%, #020617 100%); transition: opacity 0.5s; }
        
        /* カメラコンテナ（ワイプ表示用） */
        #camera-container {
            position: absolute;
            top: 130px; /* プレイヤータイマーの下 */
            left: 20px;
            width: 260px;
            z-index: 50;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(16, 185, 129, 0.5);
            box-shadow: 0 4px 20px rgba(0,0,0,0.6);
            background: #000;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #camera-container.active { opacity: 1; pointer-events: auto; }
        
        /* SFチックなスキャンライン */
        #camera-scanline {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, transparent, rgba(16, 185, 129, 0.2) 50%, transparent);
            background-size: 100% 200%;
            animation: scanAnim 2s linear infinite;
            pointer-events: none;
            z-index: 2;
        }
        @keyframes scanAnim { 0% { background-position: 0% -100%; } 100% { background-position: 0% 200%; } }

        #camera-video { width: 100%; height: auto; display: block; object-fit: cover; transform: scaleX(-1); }
        #ar-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 3; }

        #canvas-container { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; pointer-events: auto; }
        .ui-layer { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 10; display: flex; flex-direction: column; pointer-events: none; }
        .pointer-auto { pointer-events: auto; }
        
        .timer-text { font-variant-numeric: tabular-nums; }
        
        .vs-divider { position: absolute; top: 0; left: 50%; width: 2px; height: 100%; background: linear-gradient(to bottom, transparent, rgba(6,182,212,0.6) 20%, rgba(239,68,68,0.6) 80%, transparent); transform: translateX(-50%); z-index: 5; pointer-events: none; transition: opacity 0.3s; }

        @media (max-width: 768px) {
            .vs-divider { top: 50%; left: 0; width: 100%; height: 2px; background: linear-gradient(to right, transparent, rgba(6,182,212,0.6) 20%, rgba(239,68,68,0.6) 80%, transparent); transform: translateY(-50%); }
            #camera-container { top: auto; bottom: 180px; left: 20px; width: 140px; } 
        }

        .toast-enter { animation: slideDown 0.3s ease-out forwards; }
        .toast-leave { animation: fadeOut 0.5s ease-in forwards; }
        @keyframes slideDown { from { transform: translate(-50%, -100%); opacity: 0; } to { transform: translate(-50%, 0); opacity: 1; } }
        @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }

        @keyframes btPulse { 0% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(59, 130, 246, 0); } 100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); } }
        .bt-active { border-color: #3b82f6 !important; animation: btPulse 2s infinite; background: rgba(30, 58, 138, 0.8) !important; color: #93c5fd !important; }

        select { -webkit-appearance: none; -moz-appearance: none; text-overflow: ellipsis; }
    </style>
</head>
<body>

    <div id="bg-gradient"></div>
    
    <!-- 左上ワイプ：カメラ映像＆ARスキャン表示 -->
    <div id="camera-container">
        <div id="camera-scanline"></div>
        <video id="camera-video" playsinline autoplay muted></video>
        <canvas id="ar-overlay"></canvas>
    </div>

    <div id="canvas-container"></div>
    <div class="vs-divider"></div>

    <div class="ui-layer">
        <div class="w-full flex justify-between px-4 md:px-8 py-4 transition-opacity duration-300 pointer-events-none" id="top-stats">
            <div class="text-left w-1/2">
                <h2 class="text-cyan-400 font-black text-lg md:text-2xl tracking-widest flex items-center gap-2">
                    PLAYER <span id="input-indicator" class="hidden w-3 h-3 rounded-full shadow-[0_0_8px_currentColor] animate-pulse"></span>
                </h2>
                <div id="timer-player" class="text-5xl md:text-7xl font-mono font-bold timer-text text-white drop-shadow-[0_0_12px_rgba(255,255,255,0.4)]">0.00</div>
                <div id="player-status" class="text-[10px] md:text-xs text-cyan-200 mt-1 uppercase font-bold tracking-widest">Manual Mode</div>
            </div>
            <div class="text-right w-1/2">
                <h2 class="text-red-500 font-black text-lg md:text-2xl tracking-widest">AI BOT</h2>
                <div id="timer-ai" class="text-5xl md:text-7xl font-mono font-bold timer-text text-gray-600">0.00</div>
                <div id="ai-status" class="text-[10px] md:text-xs text-red-300 mt-1 uppercase font-bold tracking-widest">Lv.3 (Advanced)</div>
            </div>
        </div>

        <div class="flex-1 flex items-center justify-center pointer-events-none transition-opacity duration-300" id="vs-logo">
            <div class="text-6xl md:text-8xl font-black italic text-white opacity-10 drop-shadow-[0_0_30px_white] tracking-tighter">VS</div>
        </div>

        <div id="controls-wrapper" class="w-full p-4 md:p-6 bg-gradient-to-t from-black via-black/80 to-transparent pointer-auto transition-all duration-300">
            
            <div id="scramble-box" class="hidden max-w-3xl mx-auto mb-4 p-4 bg-slate-900/80 rounded-xl border border-slate-700 text-center backdrop-blur-md shadow-2xl">
                <p class="text-[10px] text-slate-400 mb-1 font-bold uppercase tracking-widest">Scramble</p>
                <p id="scramble-text" class="text-sm md:text-lg text-yellow-400 font-mono font-bold tracking-wider leading-relaxed"></p>
            </div>

            <!-- カメラ切り替えUI -->
            <div id="camera-select-wrapper" class="hidden max-w-4xl mx-auto mb-3 text-center pointer-auto">
                <div class="inline-flex items-center bg-slate-800/80 p-1.5 rounded-xl border border-slate-600 backdrop-blur-md shadow-lg transition-transform active:scale-95">
                    <svg class="w-4 h-4 text-emerald-400 mx-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                    <select id="camera-select" class="bg-transparent text-white font-bold text-xs py-1 pr-6 border-none outline-none cursor-pointer text-center">
                        <option>カメラを検索中...</option>
                    </select>
                </div>
            </div>

            <div class="max-w-4xl mx-auto grid grid-cols-1 md:grid-cols-4 gap-2 md:gap-3 mb-4">
                <div id="action-buttons" class="md:col-span-3 grid grid-cols-3 gap-2 transition-opacity duration-300">
                    <button id="btn-bluetooth" class="bg-slate-800 hover:bg-slate-700 text-blue-400 font-bold py-2 md:py-3 rounded-xl border border-blue-800/50 transition-all text-[9px] md:text-xs flex flex-col items-center justify-center shadow-lg active:scale-95 cursor-pointer">
                        <svg class="w-5 h-5 mb-1 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z"></path></svg>
                        <span class="block">SMART CUBE</span>
                        <span class="text-[7px] md:text-[9px] text-slate-400 font-normal mt-0.5">Bluetooth接続</span>
                    </button>
                    <button id="btn-camera" class="bg-slate-800 hover:bg-slate-700 text-emerald-400 font-bold py-2 md:py-3 rounded-xl border border-emerald-800/50 transition-all text-[9px] md:text-xs flex flex-col items-center justify-center shadow-lg active:scale-95 cursor-pointer">
                        <svg class="w-5 h-5 mb-1 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path></svg>
                        <span class="block">AUTO DETECT</span>
                        <span class="text-[7px] md:text-[9px] text-slate-400 font-normal mt-0.5">カメラ自動検出</span>
                    </button>
                    <button id="btn-prep" class="bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-2 md:py-3 rounded-xl border border-indigo-400 transition-all text-[9px] md:text-xs flex flex-col items-center justify-center shadow-[0_0_20px_rgba(79,70,229,0.4)] active:scale-95 cursor-pointer">
                        <svg class="w-5 h-5 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                        <span class="block">PREPARE</span>
                        <span class="text-[7px] md:text-[9px] text-indigo-200 font-normal mt-0.5">スクランブル開始</span>
                    </button>
                </div>
                
                <button id="btn-manual-timer" class="md:col-span-1 bg-slate-800/90 text-slate-400 font-black py-3 md:py-4 rounded-xl border-2 border-slate-600 transition-all text-xs md:text-sm cursor-pointer shadow-xl relative overflow-hidden group active:scale-[0.98] select-none touch-manipulation">
                    <span id="manual-timer-text" class="relative z-10 flex items-center justify-center gap-2 pointer-events-none">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                        WAITING...
                    </span>
                </button>
            </div>

            <div id="slider-wrapper" class="max-w-2xl mx-auto text-center bg-slate-900/50 p-2 rounded-xl border border-slate-800 transition-opacity duration-300">
                <div class="flex justify-between text-[8px] md:text-[10px] text-slate-500 font-bold mb-1.5 uppercase tracking-widest px-1">
                    <span>Beginner</span><span>Intermediate</span><span>Advanced</span><span>Expert</span><span>Master</span><span>God</span>
                </div>
                <input type="range" id="ai-level-slider" min="1" max="6" value="3" class="w-full accent-red-500 h-1.5 bg-slate-800 rounded-lg appearance-none cursor-pointer">
            </div>
        </div>
    </div>

<script>
document.addEventListener('DOMContentLoaded', () => {

    function showToast(message, type = 'error') {
        const toast = document.createElement('div');
        const bgColor = type === 'error' ? 'bg-red-600' : (type === 'success' ? 'bg-emerald-600' : 'bg-blue-600');
        toast.className = `fixed top-4 left-1/2 transform -translate-x-1/2 z-50 px-6 py-3 rounded-xl shadow-2xl text-white text-sm font-bold ${bgColor} border border-white/20 toast-enter text-center max-w-[90vw]`;
        toast.innerHTML = message;
        document.body.appendChild(toast);
        setTimeout(() => { toast.classList.add('toast-leave'); setTimeout(() => toast.remove(), 500); }, 3000);
    }

    if (typeof THREE === 'undefined') {
        showToast("3Dライブラリの読み込みに失敗しました。再読み込みしてください。", "error");
        return;
    }

    try {
        let inputMode = 'MANUAL';
        let gameState = 'IDLE'; 
        let aiLevel = 3; 
        let currentScramble = [], aiSolveSequence =[];
        let playerStartTime = 0, aiStartTime = 0, playerInterval, aiInterval;

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 0, 16);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.9); scene.add(ambientLight);
        const dirLight1 = new THREE.DirectionalLight(0xffffff, 0.7); dirLight1.position.set(10, 20, 15); scene.add(dirLight1);

        const colors = { 
            U: 0xFFD500, // Yellow
            D: 0xFFFFFF, // White
            F: 0x009E60, // Green
            B: 0x0051BA, // Blue
            R: 0xFF5800, // Orange
            L: 0xC41E3A, // Red
            In: 0x111111 
        };
        const cubieSize = 1, spacing = 1.02;

        function createRubiksCube(isAI) {
            const basePivot = new THREE.Group();
            basePivot.rotation.set(0.4, -0.4, 0); 
            const humanPivot = new THREE.Group(); basePivot.add(humanPivot);
            const scenePivot = new THREE.Group(); humanPivot.add(scenePivot);
            const cubeGroup = new THREE.Group(); scenePivot.add(cubeGroup);

            const allCubies =[];
            const geo = new THREE.BoxGeometry(cubieSize, cubieSize, cubieSize);

            function getMats(x, y, z) {
                return[
                    new THREE.MeshStandardMaterial({ color: x===1 ? colors.R : colors.In, roughness: 0.1, metalness: 0.1 }), 
                    new THREE.MeshStandardMaterial({ color: x===-1 ? colors.L : colors.In, roughness: 0.1, metalness: 0.1 }),
                    new THREE.MeshStandardMaterial({ color: y===1 ? colors.U : colors.In, roughness: 0.1, metalness: 0.1 }), 
                    new THREE.MeshStandardMaterial({ color: y===-1 ? colors.D : colors.In, roughness: 0.1, metalness: 0.1 }),
                    new THREE.MeshStandardMaterial({ color: z===1 ? colors.F : colors.In, roughness: 0.1, metalness: 0.1 }), 
                    new THREE.MeshStandardMaterial({ color: z===-1 ? colors.B : colors.In, roughness: 0.1, metalness: 0.1 }) 
                ];
            }

            for (let x = -1; x <= 1; x++) {
                for (let y = -1; y <= 1; y++) {
                    for (let z = -1; z <= 1; z++) {
                        const mesh = new THREE.Mesh(geo, getMats(x, y, z));
                        mesh.position.set(x * spacing, y * spacing, z * spacing);
                        const edges = new THREE.LineSegments(new THREE.EdgesGeometry(geo), new THREE.LineBasicMaterial({ color: 0x000000, linewidth: 4 }));
                        mesh.add(edges); cubeGroup.add(mesh); allCubies.push(mesh);
                        mesh.userData = { 
                            initPos: mesh.position.clone(), initQuat: mesh.quaternion.clone(), 
                            initColors: mesh.material.map(m => m.color.getHex()), logicPos: new THREE.Vector3(x,y,z) 
                        };
                    }
                }
            }
            return { 
                basePivot, humanPivot, scenePivot, cubeGroup, allCubies, isAI, isAnimating: false, 
                aiBaseTargetEuler: new THREE.Euler(0.4, -0.4, 0), currentTilt: {x:0, y:0},
                breathingOffset: Math.random() * Math.PI * 2, breathingSpeed: 0.0015 + Math.random() * 0.001 
            };
        }

        const playerCube = createRubiksCube(false);
        const aiCube = createRubiksCube(true);
        scene.add(playerCube.basePivot); scene.add(aiCube.basePivot);

        function updateLayout() {
            if (inputMode === 'CAMERA') return;
            const isPortrait = window.innerWidth < 768;
            if (isPortrait) {
                playerCube.basePivot.position.set(0, 4.0, 0); aiCube.basePivot.position.set(0, -3.5, 0); camera.position.z = 19;
            } else {
                playerCube.basePivot.position.set(-4.5, 0, 0); aiCube.basePivot.position.set(4.5, 0, 0); camera.position.z = 16;
            }
        }
        updateLayout(); 
        window.addEventListener('resize', () => { 
            camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); 
            updateLayout(); 
        });

        function parseMoveNotation(notation) {
            const base = notation[0], isPrime = notation.includes("'"), isDouble = notation.includes("2");
            let axis = 'y', value = [1], angleDir = -1;
            switch(base) {
                case 'U': axis = 'y'; value = [1]; angleDir = -1; break; case 'D': axis = 'y'; value = [-1]; angleDir = 1; break;
                case 'R': axis = 'x'; value = [1]; angleDir = -1; break; case 'L': axis = 'x'; value = [-1]; angleDir = 1; break;
                case 'F': axis = 'z'; value = [1]; angleDir = -1; break; case 'B': axis = 'z'; value = [-1]; angleDir = 1; break;
            }
            return { axis, values: value, angle: (Math.PI / 2) * angleDir * (isPrime ? -1 : 1) * (isDouble ? 2 : 1), baseMove: base };
        }

        function executeHumanLikeMove(cubeObj, moveConfig, callback = null) {
            if (moveConfig.move === "PAUSE") { setTimeout(() => { if(callback) callback(); }, moveConfig.duration); return; }
            const { axis, values, angle, baseMove } = parseMoveNotation(moveConfig.move);
            const dur = moveConfig.duration;
            const overshootRatio = moveConfig.overshoot || 0; 
            const lockup = moveConfig.isLockup; 
            
            if (cubeObj.isAI) {
                const tiltForce = moveConfig.tiltForce || 0.1;
                let tx = 0.4, ty = -0.4, regripX = 0, regripY = 0;
                if (baseMove === 'U') regripX = 0.25; 
                else if (baseMove === 'D') regripX = -0.25; 
                else if (baseMove === 'B') { regripX = 0.6; regripY = 0.3; } 
                else if (baseMove === 'L') regripY = -0.3; 
                else if (baseMove === 'R') regripY = 0.3; 
                if (baseMove === 'R') ty -= tiltForce; else if (baseMove === 'L') ty += tiltForce;
                else if (baseMove === 'U') tx -= tiltForce; else if (baseMove === 'D') tx += tiltForce;
                cubeObj.aiBaseTargetEuler.set(tx + regripX, ty + regripY, 0); 
            }

            const cgq = new THREE.Quaternion(); cubeObj.scenePivot.getWorldQuaternion(cgq);
            const localAxisVec = new THREE.Vector3(); localAxisVec[axis] = 1;
            const worldAxisVec = localAxisVec.clone().applyQuaternion(cgq);
            
            let bestAbsAxis = 'y', maxDot = -1, absSign = 1;
            ['x','y','z'].forEach(a => { [1,-1].forEach(v => { const v3 = new THREE.Vector3(); v3[a] = v; const dot = worldAxisVec.dot(v3); if(dot > maxDot) { maxDot = dot; bestAbsAxis = a; absSign = v; } }); });

            const cubies = cubeObj.allCubies.filter(c => {
                const p = new THREE.Vector3(); c.getWorldPosition(p); cubeObj.cubeGroup.worldToLocal(p);
                return values.some(v => Math.abs(p[bestAbsAxis] - (v * absSign * spacing)) < 0.1);
            });

            if (cubies.length === 0) { if(callback) callback(); return; }

            cubeObj.isAnimating = true; const pivot = new THREE.Group(); cubeObj.scenePivot.add(pivot); cubies.forEach(c => pivot.attach(c));

            let easeFunc;
            if (lockup) {
                easeFunc = (t) => {
                    if (t >= 1) return 1;
                    if (t < 0.2) return t * 1.5; 
                    if (t < 0.6) return 0.3 + (Math.sin(t * 50) * 0.05); 
                    if (t < 0.8) return 0.3 + ((t - 0.6) / 0.2) * 0.4; 
                    let remain = (t - 0.8) / 0.2; 
                    return 0.7 + remain * 0.3 + Math.sin(remain * Math.PI) * 0.02;
                };
            } else {
                easeFunc = (t) => {
                    if (t >= 1) return 1;
                    let val = 0;
                    if (t < 0.7) {
                        let pt = t / 0.7; val = pt * pt * (3 - 2 * pt) * 0.8; 
                    } else {
                        let mt = (t - 0.7) / 0.3;
                        let bounce = overshootRatio > 0 ? Math.sin(mt * Math.PI) * overshootRatio * (1 - mt) : Math.sin(mt * Math.PI * 2) * 0.03 * (1 - mt); 
                        val = 0.8 + (mt * 0.2) + bounce;
                    }
                    return val;
                };
            }

            const startTime = performance.now();
            function animateMove(time) {
                let t = Math.min((time - startTime) / dur, 1);
                pivot.rotation[bestAbsAxis] = angle * absSign * easeFunc(t); 
                if (t < 1) requestAnimationFrame(animateMove);
                else {
                    pivot.rotation[bestAbsAxis] = angle * absSign; pivot.updateMatrixWorld();
                    cubies.forEach(c => cubeObj.cubeGroup.attach(c)); cubeObj.scenePivot.remove(pivot);
                    cubies.forEach(cubie => {
                        const p = cubie.position; p.x = Math.round(p.x/spacing)*spacing; p.y = Math.round(p.y/spacing)*spacing; p.z = Math.round(p.z/spacing)*spacing;
                        const e = new THREE.Euler().setFromQuaternion(cubie.quaternion);
                        e.x = Math.round(e.x/(Math.PI/2))*(Math.PI/2); e.y = Math.round(e.y/(Math.PI/2))*(Math.PI/2); e.z = Math.round(e.z/(Math.PI/2))*(Math.PI/2);
                        cubie.quaternion.setFromEuler(e);
                    });
                    cubeObj.isAnimating = false;
                    if (cubeObj.isAI) cubeObj.aiBaseTargetEuler.set(0.4, -0.4, 0); 
                    checkSolveState();
                    if (callback) callback();
                }
            }
            requestAnimationFrame(animateMove);
        }

        function checkSolveState() {
            if (gameState !== 'BATTLING' || inputMode === 'CAMERA') return;
            let isSolved = playerCube.allCubies.every(c => Math.abs(c.position.x - c.userData.initPos.x) < 0.1 && Math.abs(c.position.y - c.userData.initPos.y) < 0.1 && Math.abs(c.position.z - c.userData.initPos.z) < 0.1);
            if (isSolved) forceStopBattle();
        }

        function generateHumanLikeSolve(scramble, level) {
            const rev = scramble.slice().reverse().map(m => m.endsWith("'") ? m[0] : (m.endsWith("2") ? m : m + "'"));
            const sets = { 
                1: { tps: 0.8, regrip: 0.9, pTime: 1500, lockup: 0.5,  overshoot: 0.25, tilt: 0.4, splitU2: true },   
                2: { tps: 1.5, regrip: 0.7, pTime: 800,  lockup: 0.3,  overshoot: 0.15, tilt: 0.3, splitU2: true },   
                3: { tps: 3.0, regrip: 0.4, pTime: 400,  lockup: 0.15, overshoot: 0.08, tilt: 0.2, splitU2: false }, 
                4: { tps: 5.5, regrip: 0.2, pTime: 150,  lockup: 0.05, overshoot: 0.04, tilt: 0.15,  splitU2: false }, 
                5: { tps: 8.5, regrip: 0.05, pTime: 50,  lockup: 0.01, overshoot: 0.01, tilt: 0.1, splitU2: false }, 
                6: { tps: 15.0,regrip: 0,    pTime: 0,   lockup: 0,    overshoot: 0,    tilt: 0.05, splitU2: false }  
            };
            const s = sets[level]; const baseDur = 1000 / s.tps; const out =[{ move: "PAUSE", duration: s.pTime }]; 
            let lastFace = "", movesSincePause = 0;
            rev.forEach((move) => {
                const face = move[0]; const isDouble = move.includes("2");
                if ((lastFace && lastFace !== face && Math.random() < s.regrip) || (movesSincePause > 4 && Math.random() < 0.5)) {
                    out.push({ move: "PAUSE", duration: s.pTime * (0.5 + Math.random() * 0.5) }); movesSincePause = 0;
                }
                const isLockup = Math.random() < s.lockup;
                if (isDouble && s.splitU2) {
                    const singleMove = move.replace("2", "");
                    out.push({ move: singleMove, duration: baseDur * (1 + Math.random() * 0.4), isLockup: false, overshoot: s.overshoot, tiltForce: s.tilt });
                    out.push({ move: "PAUSE", duration: s.pTime * 0.3 }); 
                    out.push({ move: singleMove, duration: baseDur * (1 + Math.random() * 0.4), isLockup: isLockup, overshoot: s.overshoot, tiltForce: s.tilt });
                    movesSincePause += 2;
                } else {
                    let moveDur = isLockup ? baseDur * (2.5 + Math.random() * 2.0) : baseDur * (0.8 + Math.random() * 0.4); 
                    if (level >= 4 && movesSincePause > 0) moveDur *= 0.85;
                    out.push({ move: move, duration: moveDur, isLockup: isLockup, overshoot: isLockup ? 0 : (s.overshoot * (0.5 + Math.random())), tiltForce: s.tilt * (0.5 + Math.random()) });
                    movesSincePause++;
                }
                if (isLockup) { out.push({ move: "PAUSE", duration: s.pTime * 1.5 }); movesSincePause = 0; }
                lastFace = face;
            });
            return out;
        }

        function rgbToHsv(r, g, b) {
            r /= 255; g /= 255; b /= 255;
            let max = Math.max(r, g, b), min = Math.min(r, g, b), h, s, v = max, d = max - min;
            s = max == 0 ? 0 : d / max;
            if (max == min) h = 0; else { switch (max) { case r: h = (g - b) / d + (g < b ? 6 : 0); break; case g: h = (b - r) / d + 2; break; case b: h = (r - g) / d + 4; break; } h /= 6; }
            return [h * 360, s * 100, v * 100];
        }

        function getCubeColorType(r, g, b) {
            const[h, s, v] = rgbToHsv(r, g, b);
            // 閾値を緩めて検出力を強化
            if (v < 20) return null; // 暗すぎるピクセルのみ除外
            if (s < 30 && v > 40) return { name: 'D', hex: 0xFFFFFF, rgb: [255,255,255] }; 
            if (s > 25) { // 彩度閾値を下げて鈍い色も検出
                if (h < 12 || h > 345) return { name: 'L', hex: 0xC41E3A, rgb:[196,30,58] }; 
                if (h >= 12 && h < 45) return { name: 'R', hex: 0xFF5800, rgb:[255,88,0] };  
                if (h >= 45 && h < 85) return { name: 'U', hex: 0xFFD500, rgb:[255,213,0] }; 
                if (h >= 85 && h < 170) return { name: 'F', hex: 0x009E60, rgb:[0,158,96] }; 
                if (h >= 170 && h < 260) return { name: 'B', hex: 0x0051BA, rgb:[0,81,186] }; 
            }
            return null;
        }

        function detectCubes(ctx, width, height) {
            const imgData = ctx.getImageData(0, 0, width, height).data;
            const pixels = new Uint8Array(width * height);
            for (let i = 0; i < width * height; i++) { if (getCubeColorType(imgData[i*4], imgData[i*4+1], imgData[i*4+2]) !== null) pixels[i] = 1; }
            const visited = new Uint8Array(width * height); const blobs =[];
            for (let y = 0; y < height; y++) {
                for (let x = 0; x < width; x++) {
                    const idx = y * width + x;
                    if (pixels[idx] === 1 && visited[idx] === 0) {
                        const queue = [idx]; visited[idx] = 1;
                        let minX = x, maxX = x, minY = y, maxY = y, count = 0, head = 0;
                        while(head < queue.length) {
                            const curr = queue[head++];
                            const cx = curr % width, cy = Math.floor(curr / width); count++;
                            if (cx < minX) minX = cx; if (cx > maxX) maxX = cx; if (cy < minY) minY = cy; if (cy > maxY) maxY = cy;
                            const neighbors = [[cx+1, cy], [cx-1, cy], [cx, cy+1],[cx, cy-1]];
                            for(let [nx, ny] of neighbors) {
                                if (nx >= 0 && nx < width && ny >= 0 && ny < height) {
                                    const nIdx = ny * width + nx;
                                    if (pixels[nIdx] === 1 && visited[nIdx] === 0) { visited[nIdx] = 1; queue.push(nIdx); }
                                }
                            }
                        }
                        if (count > 20) blobs.push({ minX, maxX, minY, maxY, count });
                    }
                }
            }
            let merged = true;
            while(merged) {
                merged = false;
                for (let i = 0; i < blobs.length; i++) {
                    for (let j = i + 1; j < blobs.length; j++) {
                        const b1 = blobs[i], b2 = blobs[j]; const expand = 15;
                        const intersect = !(b1.maxX + expand < b2.minX || b1.minX - expand > b2.maxX || b1.maxY + expand < b2.minY || b1.minY - expand > b2.maxY);
                        if (intersect) {
                            b1.minX = Math.min(b1.minX, b2.minX); b1.maxX = Math.max(b1.maxX, b2.maxX);
                            b1.minY = Math.min(b1.minY, b2.minY); b1.maxY = Math.max(b1.maxY, b2.maxY);
                            b1.count += b2.count; blobs.splice(j, 1); merged = true; break;
                        }
                    } if (merged) break;
                }
            }
            return blobs.filter(b => {
                const w = b.maxX - b.minX, h = b.maxY - b.minY, aspect = w / h;
                return w > 15 && h > 15 && aspect > 0.4 && aspect < 2.5;
            }).map(b => ({ x: (b.minX + b.maxX) / 2, y: (b.minY + b.maxY) / 2, w: b.maxX - b.minX, h: b.maxY - b.minY }));
        }

        function sampleCubeColors(ctx, cube, pWidth, pHeight) {
            const grid =[]; const stepX = cube.w / 3, stepY = cube.h / 3;
            for(let r=0; r<3; r++) {
                for(let c=0; c<3; c++) {
                    const sx = Math.floor(cube.x - cube.w/2 + c * stepX + stepX/2);
                    const sy = Math.floor(cube.y - cube.h/2 + r * stepY + stepY/2);
                    if(sx >= 0 && sx < pWidth && sy >= 0 && sy < pHeight) {
                        const pixel = ctx.getImageData(sx, sy, 1, 1).data;
                        const colorType = getCubeColorType(pixel[0], pixel[1], pixel[2]);
                        grid.push(colorType || { rgb: [50,50,50], hex: 0x333333, name: 'In' });
                    } else grid.push({ rgb:[50,50,50], hex: 0x333333, name: 'In' });
                }
            }
            return grid;
        }

        function drawMultipleARGuides(cubes, scaleX, scaleY) {
            const w = arOverlay.width, h = arOverlay.height;
            arCtx.clearRect(0, 0, w, h);
            if(inputMode !== 'CAMERA') return;

            cubes.forEach((cube) => {
                const realX = cube.x * scaleX, realY = cube.y * scaleY, realW = cube.w * scaleX, realH = cube.h * scaleY;
                const drawX = isVideoMirrored ? (w - realX) : realX;
                const drawY = realY;
                const halfW = realW / 2, halfH = realH / 2;

                // SFチックなターゲットスコープ（四隅のみ表示）
                arCtx.strokeStyle = cube.isMain ? '#10b981' : '#3b82f6'; 
                arCtx.lineWidth = 3;
                const cornerLen = Math.min(realW, realH) * 0.25;

                arCtx.beginPath(); arCtx.moveTo(drawX - halfW, drawY - halfH + cornerLen); arCtx.lineTo(drawX - halfW, drawY - halfH); arCtx.lineTo(drawX - halfW + cornerLen, drawY - halfH); arCtx.stroke();
                arCtx.beginPath(); arCtx.moveTo(drawX + halfW - cornerLen, drawY - halfH); arCtx.lineTo(drawX + halfW, drawY - halfH); arCtx.lineTo(drawX + halfW, drawY - halfH + cornerLen); arCtx.stroke();
                arCtx.beginPath(); arCtx.moveTo(drawX - halfW, drawY + halfH - cornerLen); arCtx.lineTo(drawX - halfW, drawY + halfH); arCtx.lineTo(drawX - halfW + cornerLen, drawY + halfH); arCtx.stroke();
                arCtx.beginPath(); arCtx.moveTo(drawX + halfW - cornerLen, drawY + halfH); arCtx.lineTo(drawX + halfW, drawY + halfH); arCtx.lineTo(drawX + halfW, drawY + halfH - cornerLen); arCtx.stroke();

                // 検出された色セルだけをハイライト（スキャンされた面を強調）
                const miniStep = realW / 3, startX = drawX - halfW, startY = drawY - halfH;
                cube.colors.forEach((col, i) => {
                    if (col.name !== 'In') {
                        const r = Math.floor(i / 3), c = i % 3;
                        const drawC = isVideoMirrored ? (2 - c) : c;
                        const px = startX + drawC * miniStep;
                        const py = startY + r * miniStep;
                        
                        arCtx.strokeStyle = `rgb(${col.rgb.join(',')})`;
                        arCtx.lineWidth = 2;
                        arCtx.strokeRect(px + 4, py + 4, miniStep - 8, miniStep - 8);
                        
                        arCtx.fillStyle = `rgba(${col.rgb.join(',')}, 0.3)`;
                        arCtx.fillRect(px + 4, py + 4, miniStep - 8, miniStep - 8);
                    }
                });
            });
        }

        function runAutoTrackerEngine() {
            if (inputMode !== 'CAMERA' || video.readyState !== video.HAVE_ENOUGH_DATA) return;
            if (arOverlay.width !== cameraContainer.clientWidth || arOverlay.height !== cameraContainer.clientHeight) {
                arOverlay.width = cameraContainer.clientWidth; arOverlay.height = cameraContainer.clientHeight;
            }

            const videoAspect = video.videoWidth / video.videoHeight;
            processCanvas.height = 120; processCanvas.width = Math.floor(120 * videoAspect);
            processCtx.drawImage(video, 0, 0, processCanvas.width, processCanvas.height);
            
            const detectedCubes = detectCubes(processCtx, processCanvas.width, processCanvas.height);
            const scaleX = arOverlay.width / processCanvas.width, scaleY = arOverlay.height / processCanvas.height;
            const centerX = processCanvas.width / 2, centerY = processCanvas.height / 2;

            let mainCube = null, minDist = Infinity;
            detectedCubes.forEach(cube => {
                cube.colors = sampleCubeColors(processCtx, cube, processCanvas.width, processCanvas.height);
                const dist = Math.pow(cube.x - centerX, 2) + Math.pow(cube.y - centerY, 2);
                if (dist < minDist) { minDist = dist; mainCube = cube; }
            });

            if (mainCube) {
                mainCube.isMain = true;
                mainCube.colors.forEach((col, i) => {
                    const logicX = (i % 3) - 1, logicY = 1 - Math.floor(i / 3), logicZ = 1; 
                    const cubie = playerCube.allCubies.find(cb => Math.abs(cb.userData.logicPos.x - logicX) < 0.1 && Math.abs(cb.userData.logicPos.y - logicY) < 0.1 && Math.abs(cb.userData.logicPos.z - logicZ) < 0.1);
                    if (cubie && col.name !== 'In') cubie.material[4].color.setHex(col.hex);
                });
                const targetRotX = (mainCube.y - centerY) * 0.01;
                const targetRotY = isVideoMirrored ? (centerX - mainCube.x) * 0.01 : (mainCube.x - centerX) * 0.01;
                playerCube.humanPivot.rotation.x += (targetRotX - playerCube.humanPivot.rotation.x) * 0.15;
                playerCube.humanPivot.rotation.y += (targetRotY - playerCube.humanPivot.rotation.y) * 0.15;
            } else { playerCube.humanPivot.rotation.x *= 0.9; playerCube.humanPivot.rotation.y *= 0.9; }

            drawMultipleARGuides(detectedCubes, scaleX, scaleY);
        }

            if (state === 'WAITING') { txt.innerHTML = '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg> WAITING...'; btnManualTimer.className = "md:col-span-1 bg-slate-800/90 text-slate-400 font-black py-3 md:py-4 rounded-xl border-2 border-slate-600 transition-all text-xs md:text-sm cursor-pointer shadow-xl relative overflow-hidden group active:scale-[0.98] select-none touch-manipulation"; }
            else if (state === 'READY') { txt.innerHTML = '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"></path></svg> TAP TO START'; btnManualTimer.className = "md:col-span-1 bg-emerald-600/90 text-white font-black py-3 md:py-4 rounded-xl border-2 border-emerald-400 transition-all text-xs md:text-sm cursor-pointer shadow-[0_0_20px_rgba(16,185,129,0.5)] relative overflow-hidden group active:scale-[0.98] select-none touch-manipulation"; }
            else if (state === 'STOP') { txt.innerHTML = '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 10a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1h-4a1 1 0 01-1-1v-4z"></path></svg> TAP TO STOP'; btnManualTimer.className = "md:col-span-1 bg-red-600/90 text-white font-black py-3 md:py-4 rounded-xl border-2 border-red-400 transition-all text-xs md:text-sm cursor-pointer shadow-[0_0_20px_rgba(239,68,68,0.5)] relative overflow-hidden group active:scale-[0.98] select-none touch-manipulation"; }
        }

        function generateShortScramble() { const moves =["U", "D", "R", "L", "F", "B"], mods = ["", "'", "2"], sc =[]; let lastFace = ""; for(let i=0; i<12; i++) { let f; do { f = moves[Math.floor(Math.random() * moves.length)]; } while (f === lastFace); lastFace = f; sc.push(f + mods[Math.floor(Math.random() * mods.length)]); } return sc; }
        document.getElementById('btn-prep').addEventListener('click', () => { if (gameState === 'BATTLING' || gameState === 'PREPPING') return; gameState = 'PREPPING'; resetCubes(); updateTimerUI('WAITING'); toggleControlsForBattle(false); elTimerPlayer.style.color = 'white'; elTimerPlayer.innerText = "0.00"; elTimerAi.innerText = "0.00"; elStatusPlayer.innerText = "Scrambling..."; elStatusAi.innerText = "Strategy..."; currentScramble = generateShortScramble(); document.getElementById('scramble-text').innerText = currentScramble.join(' '); document.getElementById('scramble-box').classList.remove('hidden'); aiSolveSequence = generateHumanLikeSolve(currentScramble, aiLevel); const pSeq = currentScramble.map(m => ({ move: m, duration: 80 })); let d = 0; playSequence(playerCube, pSeq, () => { d++; if(d===2) ready(); }); playSequence(aiCube, pSeq, () => { d++; if(d===2) ready(); }); function ready() { gameState = 'PREPARED'; elStatusPlayer.innerText = "READY!"; elStatusAi.innerText = "READY!"; updateTimerUI('READY'); } });
        function handleTimerAction() { if (gameState === 'PREPARED') startBattle(); else if (gameState === 'BATTLING') forceStopBattle(); else if (gameState === 'IDLE' || gameState === 'FINISHED') showToast("先に「PREPARE」ボタンを押して準備してください", "info"); }
        function startBattle() { gameState = 'BATTLING'; document.getElementById('scramble-box').classList.add('hidden'); elStatusPlayer.innerText = "SOLVING..."; elStatusAi.innerText = "SOLVING..."; toggleControlsForBattle(true); updateTimerUI('STOP'); playerStartTime = performance.now(); playerInterval = setInterval(() => { elTimerPlayer.innerText = formatTime(performance.now() - playerStartTime); }, 10); aiStartTime = performance.now(); aiInterval = setInterval(() => { elTimerAi.innerText = formatTime(performance.now() - aiStartTime); }, 10); playSequence(aiCube, aiSolveSequence, () => { clearInterval(aiInterval); aiInterval = null; elTimerAi.innerText = formatTime(performance.now() - aiStartTime); elStatusAi.innerText = "FINISHED!"; if(!playerInterval) { gameState = 'FINISHED'; toggleControlsForBattle(false); } }); }
        function forceStopBattle() { if(playerInterval) { clearInterval(playerInterval); playerInterval = null; elTimerPlayer.innerText = formatTime(performance.now() - playerStartTime); elTimerPlayer.style.color = '#10b981'; elStatusPlayer.innerText = "FINISHED!"; showToast("🎉 完成！", "success"); if(inputMode === 'MANUAL') forceSolvePlayerCube(); } updateTimerUI('WAITING'); if (!aiInterval) gameState = 'FINISHED'; toggleControlsForBattle(false); }
        btnManualTimer.addEventListener('click', handleTimerAction);

        let globalClickStart = null;
        window.addEventListener('mousedown', (e) => { globalClickStart = {x: e.clientX, y: e.clientY, time: performance.now()}; });
        window.addEventListener('mouseup', (e) => { if (!globalClickStart) return; const dx = e.clientX - globalClickStart.x, dy = e.clientY - globalClickStart.y, dt = performance.now() - globalClickStart.time; if (Math.abs(dx) < 10 && Math.abs(dy) < 10 && dt < 500) { if (!e.target.closest('button') && !e.target.closest('input') && !e.target.closest('select')) { if (gameState === 'PREPARED' || gameState === 'BATTLING') handleTimerAction(); } } globalClickStart = null; });
        window.addEventListener('touchstart', (e) => { if(e.touches.length > 0) globalClickStart = {x: e.touches[0].clientX, y: e.touches[0].clientY, time: performance.now()}; }, {passive: true});
        window.addEventListener('touchend', (e) => { if (!globalClickStart || e.changedTouches.length === 0) return; const dx = e.changedTouches[0].clientX - globalClickStart.x, dy = e.changedTouches[0].clientY - globalClickStart.y, dt = performance.now() - globalClickStart.time; if (Math.abs(dx) < 10 && Math.abs(dy) < 10 && dt < 500) { if (!e.target.closest('button') && !e.target.closest('input') && !e.target.closest('select')) { if (gameState === 'PREPARED' || gameState === 'BATTLING') handleTimerAction(); } } globalClickStart = null; });

        document.getElementById('ai-level-slider').addEventListener('input', (e) => { aiLevel = parseInt(e.target.value); const levelNames =["Lv.1 (Beginner)", "Lv.2 (Intermediate)", "Lv.3 (Advanced)", "Lv.4 (Expert)", "Lv.5 (Master)", "Lv.6 (God)"]; document.getElementById('ai-status').innerText = levelNames[aiLevel - 1]; });
        let drag = { isDragging: false, startX: 0, startY: 0, startQuat: new THREE.Quaternion() };
        function startInteraction(x, y) { if(inputMode === 'CAMERA') return; drag.isDragging = true; drag.startX = x; drag.startY = y; drag.startQuat.copy(playerCube.scenePivot.quaternion); }
        function moveInteraction(x, y) { if(!drag.isDragging) return; const dx = x - drag.startX, dy = y - drag.startY; const qx = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0,1,0), dx*0.01); const qy = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(1,0,0), dy*0.01); playerCube.scenePivot.quaternion.copy(drag.startQuat).premultiply(qx).premultiply(qy); }
        function endInteraction(x, y) { drag.isDragging = false; }
        const canvasElem = renderer.domElement;
        canvasElem.addEventListener('mousedown', (e) => { startInteraction(e.clientX, e.clientY); }); window.addEventListener('mousemove', (e) => { moveInteraction(e.clientX, e.clientY); }); window.addEventListener('mouseup', (e) => { endInteraction(e.clientX, e.clientY); });
        canvasElem.addEventListener('touchstart', (e) => { if(e.touches.length > 0) startInteraction(e.touches[0].clientX, e.touches[0].clientY); }, {passive: false}); window.addEventListener('touchmove', (e) => { if(e.touches.length > 0) moveInteraction(e.touches[0].clientX, e.touches[0].clientY); }, {passive: false}); window.addEventListener('touchend', (e) => { if(e.changedTouches.length > 0) endInteraction(e.changedTouches[0].clientX, e.changedTouches[0].clientY); });

        function animateRender() {
            requestAnimationFrame(animateRender);
            if (inputMode === 'CAMERA') runAutoTrackerEngine();
            if (gameState !== 'FINISHED' && gameState !== 'IDLE' && aiCube.isAI) {
                const time = performance.now(); const breath = Math.sin(time * aiCube.breathingSpeed + aiCube.breathingOffset) * 0.03; const tremorX = (Math.sin(time * 0.05) * Math.cos(time * 0.03)) * 0.005; const tremorY = (Math.cos(time * 0.04) * Math.sin(time * 0.06)) * 0.005;
                aiCube.humanPivot.rotation.x = breath + tremorX; aiCube.humanPivot.rotation.y = tremorY; aiCube.humanPivot.rotation.z = tremorX * 0.5;
            }
            const currentAIEuler = new THREE.Euler().setFromQuaternion(aiCube.basePivot.quaternion); currentAIEuler.x += (aiCube.aiBaseTargetEuler.x - currentAIEuler.x) * 0.2; currentAIEuler.y += (aiCube.aiBaseTargetEuler.y - currentAIEuler.y) * 0.2; aiCube.basePivot.quaternion.setFromEuler(currentAIEuler);
            renderer.render(scene, camera);
        }
        animateRender();
    } catch (e) { console.error(e); showToast("初期化に失敗しました。詳細: " + e.message, "error"); }
});
