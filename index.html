<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAX POWER ANC Simulator</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: #050505;
            color: #fff;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            background: #111;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 0 50px rgba(255, 0, 0, 0.2);
            text-align: center;
            max-width: 600px;
            width: 100%;
            border: 2px solid #333;
        }
        h2 { margin-top: 0; color: #ff3b30; letter-spacing: 3px; font-weight: 900; }
        .description { font-size: 14px; line-height: 1.6; margin-bottom: 20px; color: #ccc; }
        
        .slider-container {
            margin: 30px 0;
            padding: 20px;
            background: #222;
            border-radius: 12px;
            border: 1px solid #444;
        }
        .slider-label {
            font-size: 18px;
            font-weight: bold;
            color: #fff;
            margin-bottom: 10px;
            display: block;
        }
        input[type="range"] {
            width: 100%;
            cursor: pointer;
            accent-color: #ff3b30;
        }
        #volumeValue {
            font-size: 24px;
            color: #ff3b30;
            font-weight: bold;
        }

        .warning {
            color: #000;
            background-color: #ffcc00;
            font-weight: bold;
            font-size: 15px;
            margin-bottom: 25px;
            padding: 15px;
            border-radius: 8px;
        }
        canvas {
            width: 100%;
            height: 200px;
            background-color: #000;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid #333;
        }
        button {
            padding: 18px 40px;
            font-size: 20px;
            font-weight: 900;
            color: #fff;
            background-color: #ff3b30;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
            box-shadow: 0 5px 15px rgba(255, 59, 48, 0.4);
        }
        button:hover:not(:disabled) { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(255, 59, 48, 0.6); }
        button:disabled { background-color: #333; color: #666; cursor: not-allowed; box-shadow: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>OVERDRIVE ANC EXPERIMENT</h2>
    <p class="description">
        音量を極限まで増幅し、外の音波を力技でねじ伏せます。<br>
        スライダーを調整して、音が完全に消える「相殺点」を探してください。
    </p>

    <div class="warning">
        ⚠️ 【警告】音量を上げすぎると強烈なハウリングや爆音が鳴る危険があります。<br>
        必ずスライダーを「1.0」にした状態で開始し、イヤホンをして少しずつ上げてください。
    </div>

    <!-- 波形を描画するキャンバス -->
    <canvas id="oscilloscope" width="600" height="200"></canvas>

    <div class="slider-container">
        <label class="slider-label">増幅レベル (Gain): <span id="volumeValue">x3.0</span></label>
        <!-- 最小0倍、最大10倍（爆音）まで調整可能。初期値はデカめの3倍 -->
        <input type="range" id="volumeSlider" min="0" max="10" step="0.1" value="3.0">
    </div>
    
    <button id="startButton">爆音ANC 起動</button>
    <button id="stopButton" disabled style="margin-top: 15px; background-color: transparent; border: 2px solid #ff3b30; color: #ff3b30; box-shadow: none;">緊急停止</button>
</div>

<script>
    let audioContext;
    let mediaStream;
    let animationId;
    let preAmp; // 音量をデカくするためのアンプ

    const startButton = document.getElementById('startButton');
    const stopButton = document.getElementById('stopButton');
    const volumeSlider = document.getElementById('volumeSlider');
    const volumeValueDisplay = document.getElementById('volumeValue');
    const canvas = document.getElementById('oscilloscope');
    const canvasCtx = canvas.getContext('2d');

    // スライダーの値をリアルタイムでアンプに反映
    volumeSlider.addEventListener('input', (e) => {
        const val = parseFloat(e.target.value).toFixed(1);
        volumeValueDisplay.innerText = `x${val}`;
        if (preAmp) {
            preAmp.gain.value = val; // 音量を即時変更
        }
    });

    startButton.addEventListener('click', async () => {
        try {
            audioContext = new (window.AudioContext || window.webkitAudioContext)();

            mediaStream = await navigator.mediaDevices.getUserMedia({ 
                audio: { noiseSuppression: false, echoCancellation: false, autoGainControl: false }, 
                video: false 
            });

            const sourceNode = audioContext.createMediaStreamSource(mediaStream);

            // 1. 増幅器（プリアンプ）: マイクの音を指定倍率にデカくする
            preAmp = audioContext.createGain();
            preAmp.gain.value = volumeSlider.value; 

            // 2. 反転器（インバーター）: デカくした音を逆位相（-1.0）にする
            const phaseInverter = audioContext.createGain();
            phaseInverter.gain.value = -1.0; 

            // 波形解析ノード
            const analyserInput = audioContext.createAnalyser();
            const analyserOutput = audioContext.createAnalyser();
            analyserInput.fftSize = 2048;
            analyserOutput.fftSize = 2048;

            const bufferLength = analyserInput.frequencyBinCount;
            const dataArrayInput = new Uint8Array(bufferLength);
            const dataArrayOutput = new Uint8Array(bufferLength);

            // ==========================================
            // 接続ルーティング (マイク -> 増幅 -> 反転 -> スピーカー)
            // ==========================================
            
            // マイク入力を解析（緑）とプリアンプへ
            sourceNode.connect(analyserInput);
            sourceNode.connect(preAmp);

            // プリアンプの出力をインバーターへ
            preAmp.connect(phaseInverter);

            // インバーターの出力を解析（赤）とスピーカーへ
            phaseInverter.connect(analyserOutput);
            phaseInverter.connect(audioContext.destination);


            // ==========================================
            // 描画ループ関数（波形が画面を突き破るほどデカくなります）
            // ==========================================
            function draw() {
                animationId = requestAnimationFrame(draw);

                analyserInput.getByteTimeDomainData(dataArrayInput);
                analyserOutput.getByteTimeDomainData(dataArrayOutput);

                canvasCtx.fillStyle = 'rgb(10, 10, 10)';
                canvasCtx.fillRect(0, 0, canvas.width, canvas.height);

                canvasCtx.lineWidth = 3;
                const sliceWidth = canvas.width * 1.0 / bufferLength;

                // --- 元の波形（緑） ---
                canvasCtx.strokeStyle = 'rgb(0, 255, 128)';
                canvasCtx.beginPath();
                let x = 0;
                for (let i = 0; i < bufferLength; i++) {
                    const v = dataArrayInput[i] / 128.0;
                    const y = v * canvas.height / 2;
                    if (i === 0) canvasCtx.moveTo(x, y);
                    else canvasCtx.lineTo(x, y);
                    x += sliceWidth;
                }
                canvasCtx.stroke();

                // --- 増幅＆反転した波形（赤・爆音） ---
                canvasCtx.strokeStyle = 'rgb(255, 59, 48)';
                canvasCtx.beginPath();
                x = 0;
                for (let i = 0; i < bufferLength; i++) {
                    const v = dataArrayOutput[i] / 128.0;
                    const y = v * canvas.height / 2;
                    if (i === 0) canvasCtx.moveTo(x, y);
                    else canvasCtx.lineTo(x, y);
                    x += sliceWidth;
                }
                canvasCtx.stroke();
                
                canvasCtx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
                canvasCtx.beginPath();
                canvasCtx.moveTo(0, canvas.height / 2);
                canvasCtx.lineTo(canvas.width, canvas.height / 2);
                canvasCtx.stroke();
            }

            draw();

            startButton.disabled = true;
            stopButton.disabled = false;
            startButton.innerText = "🚨 稼働中 🚨";
            startButton.style.backgroundColor = "#ffcc00";
            startButton.style.color = "#000";

        } catch (err) {
            console.error('エラー:', err);
            alert('マイクのアクセスに失敗しました。');
        }
    });

    stopButton.addEventListener('click', () => {
        if (audioContext) audioContext.close();
        if (mediaStream) mediaStream.getTracks().forEach(track => track.stop());
        if (animationId) cancelAnimationFrame(animationId);
        
        canvasCtx.fillStyle = 'rgb(10, 10, 10)';
        canvasCtx.fillRect(0, 0, canvas.width, canvas.height);

        startButton.disabled = false;
        stopButton.disabled = true;
        startButton.innerText = "爆音ANC 起動";
        startButton.style.backgroundColor = "#ff3b30";
        startButton.style.color = "#fff";
    });
</script>

</body>
</html>
