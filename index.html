<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Active Noise Canceling (Phase Inversion) Simulator</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #222;
            color: #fff;
            margin: 0;
        }
        .container {
            background: #333;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
            max-width: 500px;
        }
        h2 { margin-top: 0; color: #4facfe; }
        .description { font-size: 14px; line-height: 1.6; margin-bottom: 20px; color: #ccc; }
        .warning {
            color: #ff4757;
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 20px;
            background: rgba(255, 71, 87, 0.1);
            padding: 10px;
            border-radius: 8px;
        }
        button {
            padding: 15px 40px;
            font-size: 18px;
            font-weight: bold;
            color: white;
            background-color: #4facfe;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        button:hover:not(:disabled) { background-color: #00f2fe; color: #222; }
        button:disabled { background-color: #555; color: #888; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="container">
    <h2>ANC（逆位相ノイズキャンセリング）シミュレーター</h2>
    <p class="description">
        人間の声はそのまま出力し、声以外の音は<br>
        「ゲイン -1.0（逆位相）」を掛けて打ち消し用の波形として出力します。
    </p>
    <div class="warning">
        ⚠️ ハウリングを防ぐため、必ずイヤホンを装着してください。
    </div>
    <button id="startButton">マイクを有効にして開始</button>
    <button id="stopButton" disabled style="margin-top: 15px; background-color: transparent; border: 1px solid #ff4757; color: #ff4757;">停止</button>
</div>

<script>
    let audioContext;
    let mediaStream;

    const startButton = document.getElementById('startButton');
    const stopButton = document.getElementById('stopButton');

    startButton.addEventListener('click', async () => {
        try {
            audioContext = new (window.AudioContext || window.webkitAudioContext)();

            // ブラウザ側のソフトウェア処理をすべて切り、生の音波を取得する
            mediaStream = await navigator.mediaDevices.getUserMedia({ 
                audio: {
                    noiseSuppression: false, 
                    echoCancellation: false,
                    autoGainControl: false
                }, 
                video: false 
            });

            const sourceNode = audioContext.createMediaStreamSource(mediaStream);

            // ==========================================
            // パス1: 人間の声（通常の再生）
            // ==========================================
            const vocalFilter = audioContext.createBiquadFilter();
            vocalFilter.type = 'bandpass';
            vocalFilter.frequency.value = 1200; // 声の帯域の中心
            vocalFilter.Q.value = 0.7;


            // ==========================================
            // パス2: ノイズキャンセリング用（逆位相の生成）
            // ==========================================
            
            // 声以外の帯域を抽出（ノイズ）
            const noiseFilter = audioContext.createBiquadFilter();
            noiseFilter.type = 'notch';
            noiseFilter.frequency.value = 1200;
            noiseFilter.Q.value = 0.7;

            // ANCのコア部分：波形の上下を反転させる（位相を180度ずらす）
            const phaseInverter = audioContext.createGain();
            phaseInverter.gain.value = -1.0; 
            // ※ここで音波をマイナス化することで、外部の音波とぶつかった時に打ち消し合う


            // ==========================================
            // 接続ルーティング
            // ==========================================
            
            // 声はそのままスピーカーへ
            sourceNode.connect(vocalFilter);
            vocalFilter.connect(audioContext.destination);

            // ノイズは抽出後、波形を反転（逆位相化）させてスピーカーへ
            sourceNode.connect(noiseFilter);
            noiseFilter.connect(phaseInverter);
            phaseInverter.connect(audioContext.destination);

            startButton.disabled = true;
            stopButton.disabled = false;
            startButton.innerText = "ANC処理 実行中...";

        } catch (err) {
            console.error('エラー:', err);
            alert('マイクのアクセスが許可されていないか、エラーが発生しました。');
        }
    });

    stopButton.addEventListener('click', () => {
        if (audioContext) audioContext.close();
        if (mediaStream) mediaStream.getTracks().forEach(track => track.stop());
        
        startButton.disabled = false;
        stopButton.disabled = true;
        startButton.innerText = "マイクを有効にして開始";
    });
</script>

</body>
</html>
