<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Full Active Noise Canceling Simulator</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #000;
            color: #fff;
            margin: 0;
        }
        .container {
            background: #111;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 0 40px rgba(255,255,255,0.1);
            text-align: center;
            max-width: 500px;
            border: 1px solid #333;
        }
        h2 { margin-top: 0; color: #fff; letter-spacing: 2px; }
        .description { font-size: 14px; line-height: 1.6; margin-bottom: 20px; color: #aaa; }
        .warning {
            color: #000;
            background-color: #ffcc00;
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 20px;
            padding: 12px;
            border-radius: 8px;
        }
        button {
            padding: 16px 40px;
            font-size: 18px;
            font-weight: bold;
            color: #000;
            background-color: #fff;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
        }
        button:hover:not(:disabled) { transform: scale(1.05); }
        button:disabled { background-color: #333; color: #666; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="container">
    <h2>FULL ANC EXPERIMENT</h2>
    <p class="description">
        マイクが拾ったすべての音波に対して<br>
        「ゲイン -1.0」を掛け、全帯域の完全打ち消しを試みます。
    </p>
    <div class="warning">
        ⚠️ 鼓膜を保護するため、最初は音量を最小にしてから<br>必ずイヤホンを装着して実行してください。
    </div>
    <button id="startButton">ANCテスト開始</button>
    <button id="stopButton" disabled style="margin-top: 15px; background-color: transparent; border: 2px solid #fff; color: #fff;">停止</button>
</div>

<script>
    let audioContext;
    let mediaStream;

    const startButton = document.getElementById('startButton');
    const stopButton = document.getElementById('stopButton');

    startButton.addEventListener('click', async () => {
        try {
            audioContext = new (window.AudioContext || window.webkitAudioContext)();

            // ブラウザのソフトウェア補正を完全オフ（生の音波を取得）
            mediaStream = await navigator.mediaDevices.getUserMedia({ 
                audio: {
                    noiseSuppression: false, 
                    echoCancellation: false,
                    autoGainControl: false
                }, 
                video: false 
            });

            const sourceNode = audioContext.createMediaStreamSource(mediaStream);

            // すべての音を反転させる（フルキャンセリング）
            const phaseInverter = audioContext.createGain();
            phaseInverter.gain.value = -1.0; 

            // フィルターを一切介さず、マイク入力を直接反転してスピーカーへ
            sourceNode.connect(phaseInverter);
            phaseInverter.connect(audioContext.destination);

            startButton.disabled = true;
            stopButton.disabled = false;
            startButton.innerText = "ANC 稼働中";
            startButton.style.backgroundColor = "#ff3b30";
            startButton.style.color = "#fff";

        } catch (err) {
            console.error('エラー:', err);
            alert('マイクのアクセスに失敗しました。');
        }
    });

    stopButton.addEventListener('click', () => {
        if (audioContext) audioContext.close();
        if (mediaStream) mediaStream.getTracks().forEach(track => track.stop());
        
        startButton.disabled = false;
        stopButton.disabled = true;
        startButton.innerText = "ANCテスト開始";
        startButton.style.backgroundColor = "#fff";
        startButton.style.color = "#000";
    });
</script>

</body>
</html>
