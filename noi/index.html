<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>マイク式ノイズキャンセリング実験</title>
<style>
body{
    background:#101010;
    color:white;
    font-family:sans-serif;
    padding:30px;
}
button{
    font-size:18px;
    padding:12px 18px;
    margin:10px 0;
}
.card{
    background:#1e1e1e;
    padding:20px;
    border-radius:14px;
    max-width:800px;
}
</style>
</head>
<body>

<div class="card">
<h1>マイク式ノイキャン実験</h1>

<p>
このデモは、マイク入力を「逆位相」にして再生する実験です。<br>
本物のANCほど精密ではありませんが、
原理を体験できます。
</p>

<button onclick="startANC()">マイク開始</button>
<button onclick="stopANC()">停止</button>

<p id="status">停止中</p>

<h2>注意</h2>
<ul>
<li>HTTPSまたはローカルファイルで開いてください</li>
<li>イヤホン推奨</li>
<li>ハウリング防止のため音量注意</li>
<li>iPhoneではSafari推奨</li>
</ul>
</div>

<script>
let audioContext;
let stream;
let source;
let inverter;

async function startANC(){
    try{
        document.getElementById("status").innerText = "マイク取得中...";

        stream = await navigator.mediaDevices.getUserMedia({
            audio: {
                echoCancellation: false,
                noiseSuppression: false,
                autoGainControl: false
            }
        });

        audioContext = new (window.AudioContext || window.webkitAudioContext)();

        source = audioContext.createMediaStreamSource(stream);

        inverter = audioContext.createGain();

        // 位相反転
        inverter.gain.value = -1;

        source.connect(inverter);
        inverter.connect(audioContext.destination);

        document.getElementById("status").innerText =
            "動作中：逆位相出力";

    }catch(err){
        document.getElementById("status").innerText =
            "マイク取得失敗: " + err.message;

        alert(
            "マイク許可が必要です。\n" +
            "Safari/Chromeでマイクを許可してください。"
        );
    }
}

function stopANC(){

    if(stream){
        stream.getTracks().forEach(track => track.stop());
    }

    if(audioContext){
        audioContext.close();
    }

    stream = null;
    audioContext = null;

    document.getElementById("status").innerText = "停止中";
}
</script>

</body>
</html>
